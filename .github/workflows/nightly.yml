name: Nightly

on:
  schedule:
    # 03:17 UTC daily — low-traffic window, avoids the top-of-hour runner rush.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  guard:
    name: Guard — canonical repo and new commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      proceed: ${{ steps.guard.outputs.proceed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide whether to build
        id: guard
        run: |
          # Only the canonical repo runs the schedule.
          if [ "${{ github.repository }}" != "0xErwin1/dbflux" ]; then
            echo "Skipping nightly: not the canonical repository."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A manual run always builds, even with no new commits.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — building regardless of new commits."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The nightly tag points at a pin commit whose first parent is the
          # main HEAD the last nightly was built from. Skip when main has not
          # advanced since then.
          CURRENT="$(git rev-parse HEAD)"
          if ! LAST="$(git rev-parse nightly^ 2>/dev/null)"; then
            echo "No previous nightly tag — building."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LAST" = "$CURRENT" ]; then
            echo "No new commits on main since last nightly ($LAST) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "main advanced $LAST -> $CURRENT — building."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  compute-version:
    name: Compute nightly version
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.nightly.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Compute version string
        id: nightly
        run: |
          # Read the workspace version (e.g. "0.7.0-rc.0" or "0.7.0-dev.3").
          # Strip any pre-existing pre-release suffix to get the base semver.
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/' | sed 's/-[^+]*//')
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Produce a semver-compatible nightly identifier. The `+` separator
          # makes the build metadata portion; it does not affect semver ordering.
          NIGHTLY_VERSION="${BASE}-nightly+${SHORT_SHA}"
          echo "version=${NIGHTLY_VERSION}" >> $GITHUB_OUTPUT
          echo "Nightly version: ${NIGHTLY_VERSION}"

  build:
    name: Build
    needs: compute-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      channel: nightly
      prerelease: true
    secrets: inherit

  release:
    name: Publish rolling nightly release
    needs: [compute-version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write      # OIDC token for build-provenance attestation
      attestations: write  # write the provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          # The `nightly` tag (and its pin commit) is needed to scope the
          # changelog to commits since the previous nightly.
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: false

      - name: Install git-cliff
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9  # v2
        with:
          tool: git-cliff
          version: 2.13.1

      - name: Generate changelog for nightly body
        run: |
          # Scope the changelog to commits since the previous nightly.
          #
          # `nightly^` is the first parent of the previous nightly's pin commit,
          # i.e. the main HEAD that nightly was built from. At this point the
          # `nightly` tag still points at the previous run (the force-move
          # happens in a later step), so `nightly^..HEAD` is exactly "what
          # changed on main since the last nightly".
          #
          # The since-last-STABLE range is deliberately avoided here: no stable
          # tag is an ancestor of main (stable/rc tags live on release/vX.Y and
          # are never merged back), so that range is pinned at the last legacy
          # stable and grows without bound. See docs/RELEASE.md.
          # A git-cliff failure must not silently produce empty release notes
          # (e.g. a cliff.toml regression). Surface it as a warning and fall back
          # to a placeholder below, but never swallow it entirely.
          if PREV_NIGHTLY="$(git rev-parse --verify --quiet nightly^)"; then
            git-cliff --config cliff.toml "${PREV_NIGHTLY}..HEAD" \
              --strip header \
              -o cliff_notes.md \
              || echo "::warning::git-cliff failed to generate nightly notes; the body may be incomplete."
          else
            # First nightly, or the tag is missing: fall back to the unreleased
            # range so the body is never empty on the initial run.
            git-cliff --config cliff.toml --unreleased \
              --strip header \
              -o cliff_notes.md \
              || echo "::warning::git-cliff failed to generate nightly notes; the body may be incomplete."
          fi

          if [ ! -s cliff_notes.md ]; then
            echo "No user-facing changes since the previous nightly." > cliff_notes.md
          fi

      - name: Compose nightly release body
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d')
          REPO="${{ github.repository }}"

          cat > release_body.md <<EOF
          > **Nightly build** — built automatically from \`main\` HEAD every day at 03:17 UTC.
          > Not recommended for production use. Artifacts are replaced on each run.
          >
          > Commit: \`${SHORT_SHA}\` — ${DATE}
          > Per-channel app icons are tracked in [#183](https://github.com/${REPO}/issues/183).

          EOF

          if [ -s cliff_notes.md ]; then
            echo "## Changes since the previous nightly" >> release_body.md
            echo "" >> release_body.md
            cat cliff_notes.md >> release_body.md
          fi

      - name: Pin nix/nightly-info.nix and move nightly tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY_VERSION="${{ needs.compute-version.outputs.version }}"

          # Compute SRI hashes from the downloaded tarballs without requiring nix.
          # openssl and base64 are both available on ubuntu-latest.
          HASH_AMD64="sha256-$(openssl dgst -sha256 -binary \
            artifacts/linux-amd64/dbflux-linux-amd64.tar.gz | base64 -w0)"
          HASH_ARM64="sha256-$(openssl dgst -sha256 -binary \
            artifacts/linux-arm64/dbflux-linux-arm64.tar.gz | base64 -w0)"

          # Regenerate nix/nightly-info.nix with the real hashes and version.
          cat > nix/nightly-info.nix <<NIX_EOF
          # Rolling nightly channel pointer — auto-generated by .github/workflows/nightly.yml.
          #
          # This file lives on the \`nightly\` git ref. The hashes and version below
          # match the artifacts published in the current rolling nightly release.
          # This file is NOT present on \`main\` with real hashes — always consume via
          # the \`nightly\` ref:
          #
          #   nix run github:0xErwin1/dbflux/nightly#dbflux-nightly
          #
          # From-source nightly (no hash needed):
          #
          #   nix run github:0xErwin1/dbflux/nightly#dbflux-source
          {
            version = "${NIGHTLY_VERSION}";

            artifacts = {
              "x86_64-linux" = {
                url = "https://github.com/0xErwin1/dbflux/releases/download/nightly/dbflux-linux-amd64.tar.gz";
                hash = "${HASH_AMD64}";
              };
              "aarch64-linux" = {
                url = "https://github.com/0xErwin1/dbflux/releases/download/nightly/dbflux-linux-arm64.tar.gz";
                hash = "${HASH_ARM64}";
              };
            };
          }
          NIX_EOF

          # Commit the pinned info file on top of the current main HEAD.
          # This commit is NOT pushed to main — it becomes the target of the
          # nightly tag. Pushing the tag carries the dangling commit object.
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add nix/nightly-info.nix
          git commit -m "chore(nightly): pin nix/nightly-info.nix ${SHORT_SHA}"

          # Force-move the nightly tag to the pin commit and push.
          # The tag push is sufficient to make the commit reachable on the remote.
          PIN_COMMIT=$(git rev-parse HEAD)
          git tag -f nightly "${PIN_COMMIT}"
          git push origin nightly --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling nightly release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: nightly
          name: DBFlux Nightly
          body_path: release_body.md
          prerelease: true
          files: |
            artifacts/linux-*/*.tar.gz
            artifacts/linux-*/*.tar.gz.sha256
            artifacts/linux-*/*.tar.gz.asc
            artifacts/linux-*/*.AppImage
            artifacts/linux-*/*.AppImage.sha256
            artifacts/linux-*/*.AppImage.asc
            artifacts/linux-*/*.deb
            artifacts/linux-*/*.deb.sha256
            artifacts/linux-*/*.deb.asc
            artifacts/linux-*/*.rpm
            artifacts/linux-*/*.rpm.sha256
            artifacts/linux-*/*.rpm.asc
            artifacts/macos-*/*.dmg
            artifacts/macos-*/*.dmg.sha256
            artifacts/macos-*/*.dmg.asc
            artifacts/windows-*/*.zip
            artifacts/windows-*/*.zip.sha256
            artifacts/windows-*/*.zip.asc
            artifacts/windows-*/*-setup.exe
            artifacts/windows-*/*-setup.exe.sha256
            artifacts/windows-*/*-setup.exe.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            artifacts/linux-*/*.tar.gz
            artifacts/linux-*/*.AppImage
            artifacts/linux-*/*.deb
            artifacts/linux-*/*.rpm
            artifacts/macos-*/*.dmg
            artifacts/windows-*/*.zip
            artifacts/windows-*/*-setup.exe
