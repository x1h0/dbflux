[package]
name = "dbflux_ui_windows"
edition.workspace = true
version.workspace = true
authors.workspace = true
description = "Connection manager and settings windows for DBFlux"
repository.workspace = true
homepage.workspace = true
license.workspace = true

[lib]

[dependencies]
gpui.workspace = true
gpui-component.workspace = true
dbflux_ui_base.workspace = true
dbflux_components.workspace = true
dbflux_core.workspace = true
dbflux_app.workspace = true
dbflux_storage.workspace = true
dbflux_portability.workspace = true
dbflux_ssh.workspace = true
dbflux_mcp = { workspace = true, optional = true }
dbflux_policy = { workspace = true, optional = true }
uuid.workspace = true
log.workspace = true
serde_json.workspace = true
rfd.workspace = true
dirs.workspace = true
open = "5"

[features]
default = []
mcp = ["dbflux_mcp", "dbflux_policy", "dbflux_app/mcp", "dbflux_ui_base/mcp"]
# `lua` and `aws` are passthroughs: no windows code uses them directly, but they
# must forward to dbflux_app/dbflux_ui_base so dbflux_app is not built twice with
# mismatched feature sets across the workspace.
lua = ["dbflux_app/lua", "dbflux_ui_base/lua"]
aws = ["dbflux_app/aws", "dbflux_ui_base/aws"]
