[package]
name = "dbflux_ui"
edition.workspace = true
version.workspace = true
authors.workspace = true
description = "GPUI UI layer for DBFlux"
repository.workspace = true
homepage.workspace = true
license.workspace = true

[lib]

[dependencies]
gpui.workspace = true
gpui-component.workspace = true
dbflux_components.workspace = true
dbflux_ui_base.workspace = true
dbflux_ui_document.workspace = true
dbflux_ui_windows.workspace = true
dbflux_ui_sidebar.workspace = true
dbflux_core.workspace = true
dbflux_storage.workspace = true
dbflux_app.workspace = true
dbflux_export.workspace = true
dbflux_ssh.workspace = true
dbflux_proxy.workspace = true
dbflux_ipc.workspace = true
dbflux_driver_ipc.workspace = true
dbflux_audit.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "time"] }
uuid.workspace = true
chrono.workspace = true
log.workspace = true
env_logger.workspace = true
serde_json.workspace = true
dirs.workspace = true
rfd.workspace = true
fuzzy-matcher.workspace = true
async-trait = "0.1"
anyhow = "1"
lsp-types = "0.97"
bincode = "1"
interprocess.workspace = true
open = "5"
indexmap = "2"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
# dbflux_ui is driver-agnostic: it has no per-driver features and no driver
# dependencies. The cross-cutting features only forward to the workspace/app and
# the sibling UI crates so a single feature set is unified across the build.
default = ["lua", "aws", "mcp"]
lua = ["dbflux_app/lua", "dbflux_ui_base/lua", "dbflux_ui_document/lua", "dbflux_ui_windows/lua", "dbflux_ui_sidebar/lua"]
aws = ["dbflux_app/aws", "dbflux_ui_base/aws", "dbflux_ui_document/aws", "dbflux_ui_windows/aws", "dbflux_ui_sidebar/aws"]
mcp = ["dbflux_app/mcp", "dbflux_ui_base/mcp", "dbflux_ui_document/mcp", "dbflux_ui_windows/mcp", "dbflux_ui_sidebar/mcp"]
vendored-openssl = ["dbflux_ssh/vendored-openssl"]

[dev-dependencies]
gpui = { workspace = true, features = ["test-support"] }
