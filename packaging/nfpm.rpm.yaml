name: dbflux
arch: ${ARCH}
platform: linux
version: ${VERSION}
release: 1
section: utility
priority: optional
maintainer: Ignacio Perez
description: |
  A fast, keyboard-first database client for SQL and NoSQL databases.
homepage: https://github.com/0xErwin1/dbflux
license: MIT
depends:
  - dbus-libs
  - libgcc
  - openssl-libs
  - systemd-libs
  - libxcb
  - libxkbcommon
  - libxkbcommon-x11
recommends:
  - fontconfig
  - hicolor-icon-theme
  - xdg-utils
contents:
  - src: target/${TARGET}/release/dbflux
    dst: /usr/bin/dbflux
  - src: packaging/dbflux.desktop
    dst: /usr/share/applications/dbflux.desktop
  - src: packaging/icons/256x256/apps/dbflux.png
    dst: /usr/share/icons/hicolor/256x256/apps/dbflux.png
  - src: packaging/icons/128x128/apps/dbflux.png
    dst: /usr/share/icons/hicolor/128x128/apps/dbflux.png
  - src: packaging/icons/64x64/apps/dbflux.png
    dst: /usr/share/icons/hicolor/64x64/apps/dbflux.png
  - src: packaging/icons/48x48/apps/dbflux.png
    dst: /usr/share/icons/hicolor/48x48/apps/dbflux.png
  - src: packaging/icons/32x32/apps/dbflux.png
    dst: /usr/share/icons/hicolor/32x32/apps/dbflux.png
  - src: packaging/icons/16x16/apps/dbflux.png
    dst: /usr/share/icons/hicolor/16x16/apps/dbflux.png
  - src: LICENSE-MIT
    dst: /usr/share/licenses/dbflux/LICENSE-MIT
  - src: LICENSE-APACHE
    dst: /usr/share/licenses/dbflux/LICENSE-APACHE
scripts:
  postinstall: packaging/scripts/postinst
